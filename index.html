<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Us 🌸</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --blush: #f9c6d0;
        --rose: #e8829a;
        --deep: #c45c76;
        --petal: #fde8ee;
        --cream: #fff5f8;
        --text: #7a3550;
        --white: #ffffff;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      html {
        height: 100%;
        -webkit-text-size-adjust: 100%;
      }

      body {
        min-height: 100%;
        font-family: "Lato", sans-serif;
        background: var(--cream);
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        touch-action: pan-y;
      }

      /* ── SPARKLE CANVAS ── */
      #sparkle-canvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      /* ── PAGE WRAPPER ── */
      .page {
        position: relative;
        z-index: 1;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: calc(1.4rem + var(--safe-top)) 1.1rem
          calc(2rem + var(--safe-bottom));
        gap: 0;
      }

      /* ── HEADER ── */
      .header {
        text-align: center;
        margin-bottom: 1.4rem;
        animation: fadeDown 0.7s ease both;
        width: 100%;
      }

      .header .eyebrow {
        font-size: 0.7rem;
        letter-spacing: 0.22em;
        color: var(--rose);
        text-transform: uppercase;
        margin-bottom: 0.45rem;
      }

      .header h1 {
        font-family: "Playfair Display", serif;
        font-size: 1.75rem;
        color: var(--deep);
        line-height: 1.15;
      }

      .header h1 em {
        font-style: italic;
        color: var(--rose);
      }

      .header .sub {
        margin-top: 0.45rem;
        font-size: 0.82rem;
        color: var(--text);
        opacity: 0.7;
        font-weight: 300;
      }

      /* ── SLIDESHOW FRAME ── */
      .frame-wrap {
        position: relative;
        width: 100%;
        max-width: 420px;
        animation: fadeUp 0.8s 0.15s ease both;
      }

      .frame-wrap::before,
      .frame-wrap::after {
        content: "🌸";
        position: absolute;
        font-size: 1.4rem;
        z-index: 3;
        pointer-events: none;
      }
      .frame-wrap::before {
        top: -0.9rem;
        left: -0.5rem;
      }
      .frame-wrap::after {
        top: -0.9rem;
        right: -0.5rem;
      }

      .slideshow {
        position: relative;
        width: 100%;
        aspect-ratio: 4/3;
        border-radius: 20px;
        overflow: hidden;
        box-shadow:
          0 0 0 3px var(--blush),
          0 0 0 6px var(--rose),
          0 16px 48px rgba(196, 92, 118, 0.28);
        /* swipe handled by JS */
        user-select: none;
        -webkit-user-select: none;
      }

      .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 0.85s ease;
        background: var(--petal) center/cover no-repeat;
        display: flex;
        align-items: flex-end;
      }

      .slide.active {
        opacity: 1;
      }

      .slide-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        color: var(--rose);
        font-size: 0.82rem;
        font-weight: 300;
        text-align: center;
        padding: 1.5rem;
        background: linear-gradient(135deg, var(--petal) 0%, var(--blush) 100%);
      }
      .slide-placeholder .ph-icon {
        font-size: 2.6rem;
      }
      .slide-placeholder .ph-num {
        font-family: "Playfair Display", serif;
        font-size: 1.2rem;
        color: var(--deep);
      }

      /* ── CAPTION ── */
      .caption-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(
          to top,
          rgba(122, 53, 80, 0.62) 0%,
          transparent 100%
        );
        padding: 2.2rem 1rem 0.85rem;
        pointer-events: none;
      }
      .caption-text {
        font-family: "Playfair Display", serif;
        font-style: italic;
        color: #fff;
        font-size: 0.95rem;
        opacity: 0;
        transform: translateY(5px);
        transition:
          opacity 0.5s 0.35s ease,
          transform 0.5s 0.35s ease;
      }
      .slide.active .caption-text {
        opacity: 1;
        transform: translateY(0);
      }

      /* ── SWIPE HINT ── */
      .swipe-hint {
        position: absolute;
        bottom: 0.65rem;
        right: 0.75rem;
        font-size: 0.6rem;
        color: rgba(255, 255, 255, 0.65);
        letter-spacing: 0.06em;
        pointer-events: none;
        z-index: 5;
        transition: opacity 0.4s;
      }
      .swipe-hint.hidden {
        opacity: 0;
      }

      /* ── DOTS ── */
      .dots-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.9rem;
        margin-bottom: 0.1rem;
        width: 100%;
      }

      .petal-corner {
        font-size: 1.2rem;
      }

      .dots {
        display: flex;
        gap: 0.42rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .dot {
        width: 0.52rem;
        height: 0.52rem;
        border-radius: 50%;
        background: var(--blush);
        /* big tap target */
        padding: 0.4rem;
        background-clip: content-box;
        cursor: pointer;
        transition:
          background 0.3s,
          transform 0.3s;
        -webkit-tap-highlight-color: transparent;
      }
      .dot.active {
        background: var(--rose);
        background-clip: content-box;
        transform: scale(1.35);
      }

      /* ── PLAYER ── */
      .player {
        margin-top: 1.5rem;
        background: var(--white);
        border: 2px solid var(--blush);
        border-radius: 50px;
        padding: 0.7rem 1.2rem;
        display: flex;
        align-items: center;
        gap: 0.9rem;
        box-shadow: 0 4px 20px rgba(196, 92, 118, 0.13);
        animation: fadeUp 0.8s 0.3s ease both;
        width: 100%;
        max-width: 420px;
      }

      .play-btn {
        width: 3rem;
        height: 3rem;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--rose), var(--deep));
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.1rem;
        flex-shrink: 0;
        box-shadow: 0 4px 14px rgba(196, 92, 118, 0.45);
        /* big tap target */
        touch-action: manipulation;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .play-btn:active {
        transform: scale(0.93);
        box-shadow: 0 2px 8px rgba(196, 92, 118, 0.35);
      }

      .player-info {
        flex: 1;
        min-width: 0;
      }
      .player-title {
        font-size: 0.82rem;
        font-weight: 400;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .player-hint {
        font-size: 0.68rem;
        color: var(--rose);
        opacity: 0.8;
        margin-top: 0.1rem;
      }

      .music-wave {
        display: flex;
        gap: 2px;
        align-items: flex-end;
        height: 20px;
      }
      .music-wave span {
        display: block;
        width: 3px;
        background: var(--rose);
        border-radius: 2px;
        animation: wave 1s ease-in-out infinite;
        height: 4px;
      }
      .music-wave span:nth-child(1) {
        animation-delay: 0s;
      }
      .music-wave span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .music-wave span:nth-child(3) {
        animation-delay: 0.3s;
      }
      .music-wave span:nth-child(4) {
        animation-delay: 0.15s;
      }
      .music-wave.paused span {
        animation-play-state: paused;
        height: 4px !important;
      }

      @keyframes wave {
        0%,
        100% {
          height: 4px;
        }
        50% {
          height: 18px;
        }
      }

      /* ── QUOTE ── */
      .quote {
        margin-top: 1.8rem;
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 0.92rem;
        color: var(--rose);
        text-align: center;
        max-width: 280px;
        opacity: 0.88;
        line-height: 1.5;
        animation: fadeUp 0.8s 0.45s ease both;
      }
      .quote::before {
        content: '"';
      }
      .quote::after {
        content: '"';
      }

      .hearts-row {
        margin-top: 0.75rem;
        font-size: 1rem;
        letter-spacing: 0.28rem;
        animation: fadeUp 0.8s 0.55s ease both;
      }

      /* ── FLOATING HEARTS ── */
      .floating-heart {
        position: fixed;
        pointer-events: none;
        z-index: 0;
        animation: floatUp linear forwards;
        opacity: 0;
      }

      @keyframes floatUp {
        0% {
          opacity: 0.85;
          transform: translateY(0) scale(1) rotate(0deg);
        }
        80% {
          opacity: 0.35;
        }
        100% {
          opacity: 0;
          transform: translateY(-95vh) scale(0.55) rotate(18deg);
        }
      }

      /* ── KEYFRAMES ── */
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── INSTRUCTIONS ── */
      .instructions {
        margin-top: 1.8rem;
        background: var(--white);
        border: 1.5px dashed var(--blush);
        border-radius: 16px;
        padding: 1rem 1.2rem;
        width: 100%;
        max-width: 420px;
        font-size: 0.76rem;
        color: var(--text);
        line-height: 1.75;
        animation: fadeUp 0.8s 0.6s ease both;
      }
      .instructions strong {
        color: var(--deep);
      }
      .instructions code {
        background: var(--petal);
        padding: 0.1em 0.3em;
        border-radius: 4px;
        font-size: 0.72rem;
        word-break: break-all;
      }

      /* ── LARGER SCREENS: subtle desktop bump ── */
      @media (min-width: 480px) {
        .header h1 {
          font-size: 2.2rem;
        }
        .play-btn {
          width: 3.2rem;
          height: 3.2rem;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="sparkle-canvas"></canvas>

    <div class="page">
      <!-- HEADER -->
      <header class="header">
        <p class="eyebrow">✨ a little something for us ✨</p>
        <h1>Every moment<br />with you is <em>my favourite</em></h1>
        <p class="sub">swipe through our memories 🌷</p>
      </header>

      <!-- SLIDESHOW -->
      <div class="frame-wrap">
        <div class="slideshow" id="slideshow">
          <!-- injected by JS -->
        </div>
        <div class="swipe-hint" id="swipeHint">swipe ›</div>
      </div>

      <!-- DOTS ROW -->
      <div class="dots-row">
        <span class="petal-corner">🌸</span>
        <div class="dots" id="dots"></div>
        <span class="petal-corner">🌸</span>
      </div>

      <!-- MUSIC PLAYER -->
      <div class="player">
        <button class="play-btn" id="playBtn" onclick="toggleMusic()">▶</button>
        <div class="player-info">
          <div class="player-title" id="songTitle">Our Song 🎵</div>
          <div class="player-hint" id="playerHint">tap to play</div>
        </div>
        <div class="music-wave paused" id="musicWave">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <!-- QUOTE -->
      <p class="quote">
        In all the world, there is no heart for me like yours.
      </p>
      <div class="hearts-row">🤍 🌸 💗 🌸 🤍</div>
    </div>

    <audio id="bgMusic" loop></audio>

    <script>
      /* ════════════════════════════════════
   CONFIGURATION — edit these!
════════════════════════════════════ */

      const SONG_SRC = "paninindigan.mp3"; // e.g. "our-song.mp3"
      const SONG_TITLE = "Paninindigan  ";

      const PHOTOS = [
        { src: "1.jpg", caption: "the day everything changed 🌸" },
        { src: "2.jpg", caption: "my favourite smile in the world 💗" },
        { src: "3.jpg", caption: "us, always 🌷" },
        { src: "4.jpg", caption: "every day with you is a gift ✨" },
        { src: "5.jpg", caption: "here's to forever 🤍" },
      ];

      /* ════════════════════════════════════
   SLIDESHOW + SWIPE
════════════════════════════════════ */
      const INTERVAL = 4000;
      let current = 0;
      let timer;
      let swipeHidden = false;

      function buildSlides() {
        const ss = document.getElementById("slideshow");
        const dots = document.getElementById("dots");
        ss.innerHTML = "";
        dots.innerHTML = "";

        PHOTOS.forEach((photo, i) => {
          const slide = document.createElement("div");
          slide.className = "slide" + (i === 0 ? " active" : "");

          if (photo.src) {
            slide.style.backgroundImage = `url('${photo.src}')`;
          } else {
            slide.innerHTML = `
        <div class="slide-placeholder">
          <span class="ph-icon">📷</span>
          <span class="ph-num">Photo ${i + 1}</span>
          <span>Add your image path in the script</span>
        </div>`;
          }

          const cap = document.createElement("div");
          cap.className = "caption-bar";
          cap.innerHTML = `<p class="caption-text">${photo.caption}</p>`;
          slide.appendChild(cap);
          ss.appendChild(slide);

          // dot (large tap target via padding)
          const dot = document.createElement("div");
          dot.className = "dot" + (i === 0 ? " active" : "");
          dot.setAttribute("role", "button");
          dot.setAttribute("aria-label", `Go to photo ${i + 1}`);
          dot.onclick = () => goToSlide(i);
          dots.appendChild(dot);
        });

        addSwipeListeners(ss);
      }

      function goToSlide(n) {
        const slides = document.querySelectorAll(".slide");
        const dotEls = document.querySelectorAll(".dot");
        slides[current].classList.remove("active");
        dotEls[current].classList.remove("active");
        current = (n + PHOTOS.length) % PHOTOS.length;
        slides[current].classList.add("active");
        dotEls[current].classList.add("active");
        resetTimer();
        hideSwipeHint();
      }

      function resetTimer() {
        clearInterval(timer);
        timer = setInterval(() => goToSlide(current + 1), INTERVAL);
      }

      function hideSwipeHint() {
        if (swipeHidden) return;
        swipeHidden = true;
        document.getElementById("swipeHint").classList.add("hidden");
      }

      /* ── Touch / swipe ── */
      function addSwipeListeners(el) {
        let startX = 0,
          startY = 0,
          dragging = false;

        el.addEventListener(
          "touchstart",
          (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            dragging = true;
          },
          { passive: true },
        );

        el.addEventListener(
          "touchend",
          (e) => {
            if (!dragging) return;
            dragging = false;
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            // only register horizontal swipe
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
              goToSlide(current + (dx < 0 ? 1 : -1));
            }
          },
          { passive: true },
        );

        // also handle mouse drag for desktop testing
        let mouseStartX = 0,
          mouseDragging = false;
        el.addEventListener("mousedown", (e) => {
          mouseStartX = e.clientX;
          mouseDragging = true;
        });
        el.addEventListener("mouseup", (e) => {
          if (!mouseDragging) return;
          mouseDragging = false;
          const dx = e.clientX - mouseStartX;
          if (Math.abs(dx) > 40) goToSlide(current + (dx < 0 ? 1 : -1));
        });
      }

      /* ════════════════════════════════════
   MUSIC
════════════════════════════════════ */
      const audio = document.getElementById("bgMusic");
      const playBtn = document.getElementById("playBtn");
      const wave = document.getElementById("musicWave");
      const titleEl = document.getElementById("songTitle");
      const hintEl = document.getElementById("playerHint");
      let playing = false;

      if (SONG_SRC) audio.src = SONG_SRC;
      titleEl.textContent = SONG_TITLE;

      function toggleMusic() {
        if (!SONG_SRC) {
          titleEl.textContent = "⚠ Add your song file!";
          hintEl.textContent = "see instructions below";
          return;
        }
        if (playing) {
          audio.pause();
          playBtn.textContent = "▶";
          hintEl.textContent = "tap to play";
          wave.classList.add("paused");
        } else {
          audio.play().catch(() => {
            hintEl.textContent = "tap again to play 🎵";
          });
          playBtn.textContent = "⏸";
          hintEl.textContent = "now playing ♪";
          wave.classList.remove("paused");
        }
        playing = !playing;
      }

      /* ════════════════════════════════════
   FLOATING HEARTS
════════════════════════════════════ */
      const EMOJIS = ["💗", "🌸", "💕", "🌷", "💖", "✨", "🤍", "💝"];

      function spawnHeart() {
        const h = document.createElement("div");
        h.className = "floating-heart";
        h.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        const size = 0.65 + Math.random() * 0.75;
        const dur = 5 + Math.random() * 5;
        const left = 4 + Math.random() * 92;
        h.style.cssText = `left:${left}vw;bottom:-2rem;font-size:${size}rem;animation-duration:${dur}s;`;
        document.body.appendChild(h);
        h.addEventListener("animationend", () => h.remove());
      }
      setInterval(spawnHeart, 1400);

      /* ════════════════════════════════════
   SPARKLE CANVAS (touch-reactive)
════════════════════════════════════ */
      const canvas = document.getElementById("sparkle-canvas");
      const ctx = canvas.getContext("2d");
      let sparks = [];

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      function createSpark(x, y, count = 4) {
        for (let i = 0; i < count; i++) {
          sparks.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 2.5,
            vy: -1.2 - Math.random() * 2,
            life: 1,
            size: 2 + Math.random() * 3,
            color: ["#f9c6d0", "#e8829a", "#ffffff", "#fde8ee"][
              Math.floor(Math.random() * 4)
            ],
          });
        }
      }

      // Tap sparks on the whole page
      document.addEventListener(
        "touchstart",
        (e) => {
          Array.from(e.touches).forEach((t) =>
            createSpark(t.clientX, t.clientY, 6),
          );
        },
        { passive: true },
      );

      document.addEventListener(
        "touchmove",
        (e) => {
          const t = e.touches[0];
          createSpark(t.clientX, t.clientY, 2);
        },
        { passive: true },
      );

      // Mouse for desktop testing
      document.addEventListener("mousemove", (e) =>
        createSpark(e.clientX, e.clientY, 2),
      );

      function animateSparks() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        sparks = sparks.filter((s) => s.life > 0);
        sparks.forEach((s) => {
          s.x += s.vx;
          s.y += s.vy;
          s.life -= 0.022;
          ctx.globalAlpha = s.life;
          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(animateSparks);
      }

      /* ════════════════════════════════════
   INIT
════════════════════════════════════ */
      buildSlides();
      resetTimer();
      animateSparks();
    </script>
  </body>
</html>
